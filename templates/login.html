{% extends "base.html" %}

{% block title %}Login - Student Management System{% endblock %}

{% block auth_content %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .login-container {
            background: #fff;
            color: #333;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }
        .login-container .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-label {
            font-weight: 500;
            color: #444;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 500;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
        .btn-outline-secondary {
            border-color: #ddd;
            color: #666;
        }
        .btn-outline-secondary:hover {
            background-color: #f8f9fa;
            border-color: #ddd;
            color: #333;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }
        .divider span {
            padding: 0 10px;
            color: #666;
            font-size: 0.85rem;
        }
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
        }
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
        }
        .brand-icon {
            font-size: 3rem;
            color: #667eea;
            text-align: center;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <i class="fas fa-graduation-cap brand-icon"></i>
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to Student Management System</p>
    
    {% if error %}
    <div class="error-message">
        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}
    
    <form method="post" class="row g-3">
        <div class="col-12">
            <label for="username" class="form-label">
                <i class="fas fa-user me-2"></i>Username
            </label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control" id="username" name="username" 
                       placeholder="Enter your username" required>
            </div>
        </div>
        <div class="col-12">
            <label for="password" class="form-label">
                <i class="fas fa-lock me-2"></i>Password
            </label>
            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Enter your password" required>
            </div>
        </div>
        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">
                    Remember me
                </label>
            </div>
        </div>
        <div class="col-12 text-center">
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </div>
    </form>
    
    <div class="divider"><span>OR</span></div>
    
    <div class="col-12 text-center">
        <a href="/register" class="btn btn-outline-secondary w-100">
            <i class="fas fa-user-plus me-2"></i>Request Access
        </a>
    </div>
    
    <div class="col-12 text-center mt-3">
        <a href="/feature-request" class="text-muted text-decoration-none">
            <i class="fas fa-lightbulb me-1"></i>Submit Feature Request
        </a>
    </div>
</div>
</body>
</html>
{% endblock %}
